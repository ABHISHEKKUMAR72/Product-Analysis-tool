<!DOCTYPE html>
<html>
<head>
  <title>Price History</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col justify-between">
  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 p-4 text-white shadow">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="font-bold text-2xl">🛒 Product Analysis Tool</h1>
      <div class="flex gap-6">
        <a href="/" class="hover:underline">Home</a>
        <a href="/products" class="hover:underline">Products</a>
        <a href="/visuals" class="hover:underline">Visuals Analysis</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto mt-10 flex-1">
    <div class="max-w-4xl mx-auto bg-white shadow-lg p-8 rounded-lg border border-gray-200">
      <h2 class="text-3xl font-bold text-gray-800 mb-4">{{ title }}</h2>
      <a href="{{ link }}" target="_blank" class="text-blue-600 hover:underline mb-6 inline-block">View Item on Store</a>
      <a href="/products" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded shadow ml-4">Back to Products</a>
      
      <div class="mt-8 border-t border-gray-200 pt-8">
        <h3 class="text-2xl font-bold mb-4">📈 Price Over Time</h3>
        {% if message %}
          <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 rounded">{{ message }}</div>
        {% elif plot %}
          <div class="flex justify-center bg-gray-50 border border-gray-100 p-4 rounded-lg">
            <img src="data:image/png;base64,{{ plot }}" alt="Price History Plot" class="max-w-full h-auto rounded shadow-sm" />
          </div>
        {% endif %}
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-white text-center py-4 mt-12">
    © 2026 Product Analysis Tool. Built with ❤️ for smarter shopping.
  </footer>
</body>
</html>
